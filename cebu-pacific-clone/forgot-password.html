<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Cebu Pacific</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="forgot-pwd-body">
    
    <!-- Top Yellow Banner -->
    <div class="forgot-hero">
        <div class="forgot-hero-content">
            <h1>Forgot Password</h1>
        </div>
    </div>

    <!-- Centered Card Area -->
    <div class="forgot-main">
        <div class="forgot-card">
            <p class="forgot-instructions">
                Enter your User ID to reset the password of your booking and management access. If you do not have one, enter your registered email address.
            </p>

            <div class="forgot-input-group">
                <label>Email/ User ID <span class="required-star">*</span></label>
                <!-- EXACT ID INCLUDED HERE -->
                <input type="text" id="reset-input" placeholder="Enter your Email/ User ID">
            </div>

            <!-- EXACT ID INCLUDED HERE -->
            <button id="reset-btn" class="reset-btn">Reset Password</button>
            
            <a href="partner-login.html" class="cancel-link">Cancel</a>
        </div>
    </div>

    <!-- Bottom Yellow Footer -->
    <div class="forgot-footer">
        © Copyright 2026 Cebu Pacific
    </div>

    <!-- ========================================== -->
    <!-- RESET PASSWORD BUTTON SCRIPT -->
    <!-- ========================================== -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const resetInput = document.getElementById('reset-input');
            const resetBtn = document.getElementById('reset-btn');

            if (resetInput && resetBtn) {
                // Listen for every time the user types a key
                resetInput.addEventListener('input', function() {
                    // .trim() ensures they can't just type empty spaces
                    if (resetInput.value.trim().length > 0) {
                        resetBtn.classList.add('active');
                    } else {
                        resetBtn.classList.remove('active');
                    }
                });

                // Make the button clickable when active
                resetBtn.addEventListener('click', function() {
                    if (resetBtn.classList.contains('active')) {
                        alert("Password reset instructions have been sent! (This is a clone)");
                    }
                });
            } else {
                console.error("Script could not find the inputs. Please check your HTML IDs.");
            }
        });
    </script>
</body>
</html>
